site_name: ASAP 8.0.0
plugins:
  - obsidian-bridge
markdown_extensions:
  - def_list
  - pymdownx.tasklist:
      custom_checkbox: true 
      clickable_checkbox: true
features:
  - navigation.footer
nav:
  - Home: 'ASAP 8.0.0 Installation Guide.md'
  - Plan: 'src/Plan.md'
  - ASAP:
    - About the ASAP Cloud Native Deployment: 'src/About-the-ASAP-Cloud-Native-Deployment.md'
    - Planning and Validating Your Cloud Environment: 'src/Planning and Validating Your Cloud Environment.md'
